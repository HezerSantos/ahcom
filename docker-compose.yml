services:
  dynamodb:
    image: amazon/dynamodb-local
    container_name: dynamodb
    user: root
    ports:
      - "8000:8000"
    volumes:
      - ./dynamodb/data:/home/dynamodblocal/data
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath /home/dynamodblocal/data"
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_REGION=us-east-1
      - AWS_SECRET_ACCESS_KEY=test
  identity-service:
    build: ./services/identity
    container_name: identity
    user: root
    ports:
      - "3000:3000"
    volumes:
      - ./services/identity:/app
    env_file:
      - ./services/identity/.env
    depends_on:
      - dynamodb
  content-service:
    build: ./services/content
    container_name: content
    ports:
      - "3001:3001"
    volumes:
      - ./services/content:/app
      - ./services/content/node_modules:/app/node_modules
    depends_on:
      - dynamodb
      - redis
    env_file:
      - ./services/content/.env
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    
